name: VLA Content Validation

on:
  push:
    branches: [main, master, 1-vla-integration]
    paths:
      - 'docs/module-4-vla/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/vla-content-validation.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/module-4-vla/**'
      - 'Dockerfile'
      - 'docker-compose.yml'

jobs:
  # Gate 1: Markdown Linting
  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: docs/module-4-vla/**/*.md
          config_file: .markdownlint.json

  # Gate 2: Code Testing
  code-tests:
    name: Python Code Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r docs/module-4-vla/code-examples/requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        working-directory: docs/module-4-vla/code-examples
        run: |
          pytest tests/ --cov=scripts --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: docs/module-4-vla/code-examples/coverage.xml
          flags: vla-code
          fail_ci_if_error: false

  # Gate 3: Accessibility Scan
  accessibility:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build

      - name: Run axe-core
        run: |
          npx @axe-core/cli build/**/*.html --exit

      - name: Run pa11y-ci
        run: |
          npx pa11y-ci --sitemap http://localhost:3000/sitemap.xml

  # Gate 4: Link Validation
  link-check:
    name: Link Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          folder-path: 'docs/module-4-vla'
          config-file: '.markdown-link-check.json'

  # Gate 5: Build Validation
  build:
    name: Docusaurus Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: docusaurus-build
          path: build/
          retention-days: 7

  # Gate 6: Performance Check
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: docusaurus-build
          path: build/

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: |
          lhci autorun --collect.staticDistDir=build --assert.preset=lighthouse:recommended
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Summary Job
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [markdown-lint, code-tests, accessibility, link-check, build, lighthouse]
    if: always()
    steps:
      - name: Check validation results
        run: |
          echo "✅ All quality gates passed!"
          echo "- Markdown linting: ${{ needs.markdown-lint.result }}"
          echo "- Code tests: ${{ needs.code-tests.result }}"
          echo "- Accessibility: ${{ needs.accessibility.result }}"
          echo "- Link validation: ${{ needs.link-check.result }}"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Performance: ${{ needs.lighthouse.result }}"
