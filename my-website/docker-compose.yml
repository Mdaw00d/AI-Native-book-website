version: '3.8'

services:
  vla-container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vla-ros2-simulation
    image: vla-integration:latest

    # Enable GUI support for Gazebo
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=42
      - GAZEBO_MODEL_PATH=/workspace/assets/robot:/workspace/assets/worlds

    # X11 forwarding for GUI
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./docs/module-4-vla/assets:/workspace/assets:rw
      - ./docs/module-4-vla/code-examples:/workspace/code-examples:rw

    # Network mode for ROS 2 communication
    network_mode: host

    # Privileged mode for device access (audio, camera if needed)
    privileged: true

    # Device access for audio
    devices:
      - /dev/snd:/dev/snd

    # Keep container running
    stdin_open: true
    tty: true

    # Resource limits (adjust based on host)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    command: /bin/bash
